<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width,
                 initial-scale=1.0,
                 maximum-scale=1.0,
                 user-scalable=no">

    <title>DOME TELEMETRY</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/typography.css">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">

</head>

<body>

<div class="hud-background"></div>

<div class="telemetry">

    <!-- HEADER -->

    <header class="hud-header">

        <div class="header-left panel">

            <div class="panel__header">
                <span class="ui-label">
                    DOME STATUS
                </span>
            </div>

            <div style="display:flex;align-items:center;gap:10px;">

                <span class="status-dot"></span>

                <span class="value u-data-font">
                    NOMINAL
                </span>

            </div>

        </div>

        <div class="header-center">

            <div
                class="header-clock"
                id="clock">

                00:00:00

            </div>

        </div>

        <div class="header-right panel">

            <div class="panel__header">
                <span class="ui-label">
                    NETWORK
                </span>
            </div>

            <div style="display:flex;align-items:center;gap:10px;">

                <span class="status-dot"></span>

                <span class="value u-data-font">
                    CONNECTED
                </span>

            </div>

        </div>

    </header>

    <!-- LEFT -->

    <aside class="hud-climate">

        <!-- TEMP -->

        <section class="panel">

            <div class="panel__header">
                <span class="ui-label">
                    TEMPERATURE
                </span>
            </div>

            <div class="value value--lg"
                 id="tempValue">

                22.4°C

            </div>

            <svg
                class="sparkline"
                viewBox="0 0 100 40">

                <polyline
                    id="tempSpark">

                </polyline>

            </svg>

        </section>

        <!-- HUMIDITY -->

        <section class="panel">

            <div class="panel__header">
                <span class="ui-label">
                    HUMIDITY
                </span>
            </div>

            <div class="value value--lg"
                 id="humValue">

                45%

            </div>

            <svg
                class="sparkline"
                viewBox="0 0 100 40">

                <polyline
                    id="humSpark">

                </polyline>

            </svg>

        </section>

        <!-- CO2 -->

        <section class="panel">

            <div class="panel__header">
                <span class="ui-label">
                    CO₂ LEVEL
                </span>
            </div>

            <div class="value value--lg"
                 id="co2Value">

                680 ppm

            </div>

            <svg
                class="sparkline"
                viewBox="0 0 100 40">

                <polyline
                    id="co2Spark">

                </polyline>

            </svg>

        </section>

    </aside>

    <!-- CENTER -->

    <main class="hud-center">

        <div class="planet-placeholder">

        </div>

    </main>

    <!-- RIGHT -->

    <aside class="hud-power">

        <section class="panel power-summary">

            <div class="panel__header">

                <span class="ui-label">

                    ENERGY

                </span>

            </div>

            <div class="power-metric">

                <div class="ui-label">
                    SOLAR GENERATION
                </div>

                <div
                    id="solarValue"
                    class="value value--lg">

                    3.8 kW

                </div>

            </div>

            <div class="power-metric">

                <div class="ui-label">
                    TOTAL CONSUMPTION
                </div>

                <div
                    id="loadValue"
                    class="value value--lg">

                    2.9 kW

                </div>

            </div>

            <div class="power-metric">

                <div class="ui-label">
                    BATTERY
                </div>

                <div
                    id="batteryValue"
                    class="value value--lg">

                    87%

                </div>

            </div>

        </section>

        <section
            class="power-grid"
            id="powerGrid">

        </section>

    </aside>

    <!-- FOOTER -->

    <footer class="hud-footer">

        <div class="panel footer-panel">

            <span class="ui-label">

                AUTONOMY

            </span>

            <span class="value value--lg">

                94%

            </span>

        </div>

        <div class="panel footer-panel">

            <span class="ui-label">

                AIR QUALITY

            </span>

            <span class="value value--lg">

                NORMAL

            </span>

        </div>

        <div class="panel footer-panel">

            <span class="ui-label">

                SOLAR FORECAST

            </span>

            <span class="value value--lg">

                GOOD

            </span>

        </div>

        <div class="panel footer-panel">

            <span class="ui-label">

                MISSION TIME

            </span>

            <span
                class="value value--lg"
                id="missionTime">

                00:00

            </span>

        </div>

    </footer>

</div>

<script src="js/app.js"></script>

</body>
</html>
