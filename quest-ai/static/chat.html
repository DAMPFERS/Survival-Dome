<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оракул Квеста</title>
<style>
  body {
    margin: 0; font-family: Georgia, serif; background: #14100d; color: #e8dcc4;
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    padding: 20px; text-align: center; background: #1f1810; border-bottom: 2px solid #6b5433;
    font-size: 24px; letter-spacing: 2px;
  }
  #log {
    flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 14px;
  }
  .msg { max-width: 70%; padding: 12px 16px; border-radius: 8px; line-height: 1.4; }
  .user { align-self: flex-end; background: #3a2e1d; }
  .assistant { align-self: flex-start; background: #241c12; border: 1px solid #6b5433; }
  #inputRow { display: flex; padding: 16px; background: #1f1810; border-top: 2px solid #6b5433; }
  #userInput {
    flex: 1; padding: 12px; font-size: 16px; background: #0d0a06; color: #e8dcc4;
    border: 1px solid #6b5433; border-radius: 6px;
  }
  #sendBtn {
    margin-left: 10px; padding: 12px 24px; background: #6b5433; color: #fff;
    border: none; border-radius: 6px; cursor: pointer; font-size: 16px;
  }
  #sendBtn:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
<header>Хранитель Архива</header>
<div id="log"></div>
<div id="inputRow">
  <input id="userInput" type="text" placeholder="Спросите Хранителя..." autofocus />
  <button id="sendBtn">Спросить</button>
</div>

<script>
const log = document.getElementById('log');
const input = document.getElementById('userInput');
const btn = document.getElementById('sendBtn');

const proto = location.protocol === 'https:' ? 'wss' : 'ws';
const ws = new WebSocket(`${proto}://${location.host}/ws/chat`);

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

ws.onopen = () => {
  addMessage('Хранитель слушает вас...', 'assistant');
};

ws.onmessage = (event) => {
  addMessage(event.data, 'assistant');
  btn.disabled = false;
};

ws.onclose = () => {
  addMessage('Связь прервана. Обновите страницу.', 'assistant');
};

function send() {
  const text = input.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  ws.send(text);
  input.value = '';
  btn.disabled = true;
}

btn.addEventListener('click', send);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') send();
});
</script>
</body>
</html>
